name: ngumpul_in
description: Aplikasi Rekomendasi Tempat Nongkrong Berbasis Collaborative Filtering

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0                      # HTTP client
  shared_preferences: ^2.2.2       # Simpan token lokal
  flutter_secure_storage: ^9.0.0   # Simpan token lebih aman (opsional)
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
